# Main pipeline - prechecks and mirror pushes

prechecks:
  interruptible: true
  stage: prechecks
  tags:
    - datastore
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_TAG =~ /^bark-/
    - if: $CI_COMMIT_TAG =~ /^server-/
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL =~ /^https:\/\/gitlab\.com\/ark-bitcoin\/bark($|-)/
  script:
    - git log --oneline -1
    - echo "Cleaning up..."
    - rm -rf "/host/data/test/${CI_COMMIT_SHA}/" || true
    - rm -rf "/host/data/codecov/${CI_COMMIT_SHA}/" || true
    - echo "Running prechecks..."
    - nix develop .#default --command bash -c "just prechecks"

check-versions:
  interruptible: true
  stage: prechecks
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - prechecks
  script:
    - bash ./contrib/check-versions.sh "${CI_COMMIT_TAG}"

check-gitlab-release:
  interruptible: true
  stage: prechecks
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - prechecks
  script:
    - bash ./contrib/check-gitlab-release.sh "${CI_COMMIT_TAG}"
