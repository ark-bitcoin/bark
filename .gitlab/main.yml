# Main pipeline - prechecks and mirror pushes

push-github-mirror:
  stage: prechecks
  before_script:
    - eval $(ssh-agent -s)
    - echo "$GITHUB_LOGIN_TOKEN" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - git remote add github git@github.com:ark-bitcoin/bark.git || git remote set-url github git@github.com:ark-bitcoin/bark.git
    - git push --force github HEAD:master
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"
  allow_failure: true

push-codeberg-mirror:
  stage: prechecks
  before_script:
    - eval $(ssh-agent -s)
    - echo "$CODEBERG_LOGIN_TOKEN" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
  script:
    - git remote add codeberg git@codeberg.org:ark-bitcoin/bark.git || git remote set-url codeberg git@codeberg.org:ark-bitcoin/bark.git
    - git push --force codeberg HEAD:master
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"
  allow_failure: true

prechecks:
  stage: prechecks
  script:
    - git log --oneline -1
    - echo "Cleaning up..."
    - rm -rf "/host/data/test/${CI_COMMIT_SHA}/" || true
    - rm -rf "/host/data/codecov/${CI_COMMIT_SHA}/" || true
    - echo "Running prechecks..."
    - nix develop .#default --command bash -c "just prechecks"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_TAG =~ /^bark-/
    - if: $CI_COMMIT_TAG =~ /^server-/
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"
