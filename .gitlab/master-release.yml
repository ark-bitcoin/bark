# Master branch release - builds and pushes captaind on master push

.master-release-rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"

.master-and-mr-release-rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"
    - if: $CI_MERGE_REQUEST_RELEASE_PIPELINE == "true"


push-github-mirror:
  allow_failure: true
  stage: mirror
  extends: .master-release-rules
  before_script:
    - sudo chown -R nixuser:nixbld "$CI_PROJECT_DIR" || true
    - eval $(ssh-agent -s)
    - echo "$GITHUB_LOGIN_TOKEN" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - git remote add github git@github.com:ark-bitcoin/bark.git || git remote set-url github git@github.com:ark-bitcoin/bark.git
    - git push --force github HEAD:master

push-codeberg-mirror:
  allow_failure: true
  stage: mirror
  extends: .master-release-rules
  before_script:
    - sudo chown -R nixuser:nixbld "$CI_PROJECT_DIR" || true
    - eval $(ssh-agent -s)
    - echo "$CODEBERG_LOGIN_TOKEN" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
  script:
    - git remote add codeberg git@codeberg.org:ark-bitcoin/bark.git || git remote set-url codeberg git@codeberg.org:ark-bitcoin/bark.git
    - git push --force codeberg HEAD:master

generate-rustdocs:
  allow_failure: true
  stage: publish
  extends: .master-release-rules
  needs:
    - bark-mempool
    - bark-btc30
  script:
    - nix develop .#default --command bash -c "just rustdocs"
    - sudo cp -r rustdocs/doc/ /host/data/rustdocs/doc/
    - bash contrib/generate-index.sh /host/data/rustdocs/doc
    - echo "rustdocs -> https://rustdocs.2nd.dev/master/"

parse-server-githash:
  stage: build
  extends: .master-and-mr-release-rules
  script:
    - git rev-parse HEAD > VERSION
    - cat VERSION
  artifacts:
    paths:
      - VERSION
    expire_in: 1 day

build-server-githash:
  stage: build
  extends: .master-and-mr-release-rules
  needs:
    - parse-server-githash
  script:
    - cat VERSION
    - just release-server
    - cp ./target/x86_64-unknown-linux-gnu/release/captaind  captaind-linux-x86_64
    - cp ./target/x86_64-unknown-linux-gnu/release/watchmand watchmand-linux-x86_64
  artifacts:
    paths:
      - captaind-linux-x86_64
      - watchmand-linux-x86_64
    expire_in: 1 day

build-and-push-server-to-registry-githash:
  allow_failure: true
  stage: release
  tags:
    - privileged
  extends: .master-and-mr-release-rules
  needs:
    - parse-server-githash
    - build-server-githash
  script:
    - cat VERSION
    # Build the containers
    - buildah build -f ./.gitlab/images/releases/captaind/Dockerfile  --tag "registry.2nd.dev/captaind:$(cat VERSION)" .
    # Push containers to registry.2nd.dev
    - buildah push "registry.2nd.dev/captaind:$(cat VERSION)"
    - curl "http://192.168.2.10:7777/zulip?topic=deployment&type=bell&message=captaind%20$(cat VERSION)%20is%20ready%20for%20deployment."
    - curl "http://192.168.2.10:7777/zulip?topic=deployment&type=bell&message=watchmand%20$(cat VERSION)%20is%20ready%20for%20deployment."
