# Server release pipeline - triggered on server-* tags

.server-release-rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^server-/

.server-release-rules-gitlab:
  rules:
    - if: $CI_COMMIT_TAG =~ /^server-/ && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"

parse-versions-server:
  stage: build
  extends: .server-release-rules
  script:
    - bash ./contrib/parse-versions.sh "${CI_COMMIT_TAG}" > VERSION
    - cat VERSION
  artifacts:
    paths:
      - VERSION
    expire_in: 1 day

build-server:
  stage: build
  extends: .server-release-rules
  needs:
    - parse-versions-server
  variables:
    SDKROOT: /usr/local/osxcross/SDK/MacOSX15.4.sdk
  script:
    - cat VERSION
    - just release-server
    - cp ./target/x86_64-unknown-linux-gnu/release/captaind  captaind-linux-x86_64
    - cp ./target/x86_64-unknown-linux-gnu/release/watchmand watchmand-linux-x86_64
  artifacts:
    paths:
      - captaind-linux-x86_64
      - watchmand-linux-x86_64
    expire_in: 1 day

build-and-push-captaind-to-registry:
  allow_failure: true
  stage: release
  tags:
    - privileged
  extends: .server-release-rules
  needs:
    - parse-versions-server
    - build-server
  script:
    - cat VERSION
    # Build the containers
    - buildah build --network=host -f ./.gitlab/images/releases/captaind/Dockerfile --tag registry.2nd.dev/captaind:latest .
    # Push containers to registry.2nd.dev
    - buildah push registry.2nd.dev/captaind:latest
    # Tag containers with specific version number for registry.2nd.dev
    - buildah tag registry.2nd.dev/captaind:latest "registry.2nd.dev/captaind:$(cat VERSION)"
    # Push containers with specific version number to registry.2nd.dev
    - buildah push "registry.2nd.dev/captaind:$(cat VERSION)"

push-captaind-to-docker:
  allow_failure: true
  stage: release
  tags:
    - privileged
  extends: .server-release-rules-gitlab
  needs:
    - parse-versions-server
    - build-server
    - build-and-push-captaind-to-registry
  script:
    - cat VERSION
    # Pull containers from registry.2nd.dev
    - buildah pull registry.2nd.dev/captaind:latest
    # Tag containers for docker.io
    - buildah tag registry.2nd.dev/captaind:latest docker.io/secondark/captaind:latest
    # Push containers to docker.io
    - buildah push docker.io/secondark/captaind:latest
    # Tag containers with specific version number for docker.io
    - buildah tag registry.2nd.dev/captaind:latest "docker.io/secondark/captaind:$(cat VERSION)"
    # Push containers with specific version number to docker.io
    - buildah push "docker.io/secondark/captaind:$(cat VERSION)"

release-server:
  stage: release
  extends: .server-release-rules-gitlab
  needs:
    - parse-versions-server
    - build-server
  script:
    - cat VERSION
    - cp captaind-linux-x86_64  "captaind-$(cat VERSION)-linux-x86_64"
    - cp watchmand-linux-x86_64 "watchmand-$(cat VERSION)-linux-x86_64"
    - sha256sum "captaind-$(cat VERSION)-linux-x86_64" > SHA256SUMS
    - sha256sum "watchmand-$(cat VERSION)-linux-x86_64" >> SHA256SUMS
  artifacts:
    paths:
      - captaind-*
      - watchmand-*
      - SHA256SUMS
    expire_in: 1 day

publish-server-gitlab:
  stage: release
  extends: .server-release-rules-gitlab
  needs:
    - parse-versions-server
    - build-server
    - release-server
  script:
    - cat VERSION
    - bash ./contrib/ci-gitlab-release.sh "./captaind-$(cat VERSION)-linux-x86_64 ./watchmand-$(cat VERSION)-linux-x86_64 ./SHA256SUMS"
