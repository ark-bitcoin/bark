# Test pipeline - build and integration tests

.build-rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^bark-/
    - if: $CI_COMMIT_TAG =~ /^server-/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"
    - if: $CI_CODECOV_PIPELINE == "true"

.test-rules-no-tags:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"

.test-and-codecov-rules-no-tags:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"
    - if: $CI_CODECOV_PIPELINE == "true"

check-commits:
  interruptible: true
  stage: prechecks
  extends: .test-and-codecov-rules-no-tags
  needs:
    - prechecks
  script:
    - date +"%Y%m%d-%H%M%S" > RUN_DATETIME
    - git log --oneline -1
    - |
      if [ -z "$CI_COMMIT_TAG" ]; then
        nix develop .#default --command bash -c "just check-commits"
      else
        echo "Skipping check-commits for tag event"
      fi
    - git log --oneline -1
  artifacts:
    paths:
      - RUN_DATETIME
    expire_in: 1 day

build:
  interruptible: true
  stage: build
  extends: .build-rules
  needs:
    - prechecks
    - check-commits
  script:
    - git log --oneline -1
    - nix develop .#default --command bash -c "just build-ci"
    - nix develop .#default --command bash -c "just build-unit-tests-ci"
    - nix develop .#default --command bash -c "just build-integration-tests-ci"
  artifacts:
    paths:
      - target/ci/examples/
      - target/ci/captaind
      - target/ci/bark
      - target/ci/barkd
      - target/ci/unit-tests.tar.zst
      - target/ci/integration-tests.tar.zst
    expire_in: 1 day

compare-static-files:
  interruptible: true
  stage: test
  extends: .test-and-codecov-rules-no-tags
  needs:
    - build
  variables:
    ASSUME_BUILT: "1"
    EXAMPLES_DIR: target/ci/examples
  script:
    - nix develop .#default --command bash -c "just generate-static-files"
    - bash contrib/check-clean-diff.sh bark/schema.sql
    - bash contrib/check-clean-diff.sh server/schema.sql
    - bash contrib/check-clean-diff.sh bark-rest/openapi.json
    - bash contrib/check-clean-diff.sh bark-rest-client/

test-unit:
  interruptible: true
  stage: test
  extends: .test-and-codecov-rules-no-tags
  needs:
    - build
  script:
    - git log --oneline -1
    - nix develop .#default --command bash -c "cargo nextest run --archive-file target/ci/unit-tests.tar.zst"

use-bark-as-dependency:
  interruptible: true
  stage: test
  extends: .test-and-codecov-rules-no-tags
  needs:
    - test-unit
  script:
    - |
      nix develop .#default --command bash -c "
        cargo init barktest &&
        cd barktest &&
        cargo add bark-wallet &&
        cargo update &&
        cargo build
      "

bark-as-libs:
  interruptible: true
  stage: test
  extends: .test-and-codecov-rules-no-tags
  needs:
    - test-unit
  script:
    - |
      nix develop .#default --command bash -c "
        cargo build -p bark-wallet      --no-default-features --features=\"\" &&
        cargo build -p bark-bitcoin-ext --no-default-features --features=\"\" &&
        cargo build -p ark-lib          --no-default-features --features=\"\"
      "

lib-wasm:
  interruptible: true
  stage: test
  extends: .test-and-codecov-rules-no-tags
  needs:
    - test-unit
  script:
    - |
      nix develop .#default --command bash -c "
        cd lib/ &&
        cargo build --lib --release --target \"wasm32-unknown-unknown\" --features wasm-js
      "

lib-msrv:
  interruptible: true
  stage: test
  extends: .test-and-codecov-rules-no-tags
  needs:
    - test-unit
  script:
    - |
      nix develop .#msrv-lib --command bash -c "
        cd testing/msrv-lib &&
        cargo build
      "

check-release:
  interruptible: true
  stage: test
  extends: .test-and-codecov-rules-no-tags
  needs:
    - test-unit
  script:
    - |
      nix develop .#default --command bash -c "
        cargo check --release -p bark-cli -p bark-server
      "

test-integration-esplora:
  interruptible: true
  stage: test
  tags:
    - integration
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_URL == "https://gitlab.com/ark-bitcoin/bark"
  needs:
    - check-commits
    - build
  variables:
    CHAIN_SOURCE: esplora
    TEST_DIRECTORY: ./test/esplora
    NEXTEST_TEST_THREADS: "2"
    BARK_COMMAND_TIMEOUT_MILLIS: "120000"
    TX_PROPAGATION_TIMEOUT: "30000"
  script:
    - git log --oneline -1
    - export RUN_DATETIME=$(cat RUN_DATETIME)
    - export CAPTAIND_EXEC=${CI_PROJECT_DIR}/target/ci/captaind
    - export BARK_EXEC=${CI_PROJECT_DIR}/target/ci/bark
    - export BARKD_EXEC=${CI_PROJECT_DIR}/target/ci/barkd
    - bash ./contrib/ci-run-test.sh test-integration-prebuilt

test-integration-mempool:
  interruptible: true
  allow_failure: true
  stage: test
  tags:
    - integration
  extends: .test-rules-no-tags
  needs:
    - check-commits
    - build
  variables:
    CHAIN_SOURCE: mempool
    TEST_DIRECTORY: ./test/mempool
    NEXTEST_TEST_THREADS: "2"
    BARK_COMMAND_TIMEOUT_MILLIS: "120000"
    TX_PROPAGATION_TIMEOUT: "30000"
  script:
    - git log --oneline -1
    - export RUN_DATETIME=$(cat RUN_DATETIME)
    - export CAPTAIND_EXEC=${CI_PROJECT_DIR}/target/ci/captaind
    - export BARK_EXEC=${CI_PROJECT_DIR}/target/ci/bark
    - export BARKD_EXEC=${CI_PROJECT_DIR}/target/ci/barkd
    - bash ./contrib/ci-run-test.sh test-integration-prebuilt

test-integration-btc30:
  interruptible: true
  stage: test
  tags:
    - integration
  extends: .test-rules-no-tags
  needs:
    - check-commits
    - build
  variables:
    TEST_DIRECTORY: ./test/btc30
    NEXTEST_TEST_THREADS: "2"
    BARK_COMMAND_TIMEOUT_MILLIS: "120000"
    TX_PROPAGATION_TIMEOUT: "30000"
  script:
    - git log --oneline -1
    - export RUN_DATETIME=$(cat RUN_DATETIME)
    - export CAPTAIND_EXEC=${CI_PROJECT_DIR}/target/ci/captaind
    - export BARK_EXEC=${CI_PROJECT_DIR}/target/ci/bark
    - export BARKD_EXEC=${CI_PROJECT_DIR}/target/ci/barkd
    - bash ./contrib/ci-run-test.sh test-integration-client-prebuilt

test-integration-filestore:
  interruptible: true
  allow_failure: true
  stage: test
  tags:
    - integration
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - bark/src/persist/**/*
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - bark/src/persist/**/*
  needs:
    - check-commits
    - build
  variables:
    CHAIN_SOURCE: mempool
    USE_FILESTORE: "1"
    TEST_DIRECTORY: ./test/filestore
    NEXTEST_TEST_THREADS: "2"
    BARK_COMMAND_TIMEOUT_MILLIS: "120000"
    TX_PROPAGATION_TIMEOUT: "30000"
  script:
    - git log --oneline -1
    - export RUN_DATETIME=$(cat RUN_DATETIME)
    - export CAPTAIND_EXEC=${CI_PROJECT_DIR}/target/ci/captaind
    - export BARK_EXEC=${CI_PROJECT_DIR}/target/ci/bark
    - export BARKD_EXEC=${CI_PROJECT_DIR}/target/ci/barkd
    - bash ./contrib/ci-run-test.sh test-integration-client-prebuilt

tar-and-print-test-data:
  interruptible: true
  stage: post-test
  extends: .test-rules-no-tags
  needs:
    - job: test-integration-esplora
      optional: true
    - job: test-integration-mempool
      optional: true
    - job: test-integration-btc30
      optional: true
    - job: test-integration-filestore
      optional: true
  script:
    - |
      SRC="/host/data/test/${CI_COMMIT_SHA}"
      DST="/host/data/test/${CI_COMMIT_SHA}.tar.gz"
      if [ -d "$SRC" ]; then
        echo "Tarring test data: $SRC"
        tar -czf "$DST" "$SRC/"
        sudo mv "$DST" "$SRC/"
        echo "Test data tar.gz     -> https://ci.2nd.dev/testdata/${CI_COMMIT_SHA}/${CI_COMMIT_SHA}.tar.gz"
        echo "Test data URL        -> https://ci.2nd.dev/testdata/${CI_COMMIT_SHA}/"
      else
        echo "Warning: Test data directory $SRC does not exist – skipping tar"
      fi
