bark-int-action-reentrancy:
  interruptible: true
  stage: test
  # Double-drives every wallet-action step across the bark, barkd and bark-sdk
  # suites. allow_failure until the remaining action flows (board, round,
  # offboard, exit) are audited/hardened for reentrancy; flip to blocking once
  # the suite is green under double-drive.
  allow_failure: true
  tags:
    - integration
    - datastore
  extends: .test-rules-no-tags
  needs:
    - check-commits
    - build
    - build-test-archives
  variables:
    TEST_DIRECTORY: ./test/bark-int-action-reentrancy
    NEXTEST_TEST_THREADS: "4"
    BARK_COMMAND_TIMEOUT_MILLIS: "120000"
    TX_PROPAGATION_TIMEOUT: "30000"
    BARK_DOUBLE_DRIVE_ACTIONS: "1"
  script:
    - git log --oneline -1
    - export RUN_DATETIME=$(cat RUN_DATETIME)
    - export CAPTAIND_EXEC=${CI_PROJECT_DIR}/target/ci/captaind
    - export WATCHMAND_EXEC=${CI_PROJECT_DIR}/target/ci/watchmand
    - export BARK_EXEC=${CI_PROJECT_DIR}/target/ci/bark
    - export BARKD_EXEC=${CI_PROJECT_DIR}/target/ci/barkd
