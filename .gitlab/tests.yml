int-bark-0.1.0-beta.9:
  interruptible: true
  when: manual # currently broken, need to look into a solution
  stage: test
  tags:
    - integration
    - datastore
  extends: .test-rules-no-tags
  needs:
    - check-commits
    - build
    - build-test-archives
  variables:
    TEST_DIRECTORY: ./test/bark-0.1.0-beta.9
    NEXTEST_TEST_THREADS: "2"
    BARK_COMMAND_TIMEOUT_MILLIS: "120000"
    TX_PROPAGATION_TIMEOUT: "30000"
    BARK_RELEASE_URL: https://gitlab.com/ark-bitcoin/bark/-/releases/bark-0.1.0-beta.9/downloads/bark-0.1.0-beta.9-linux-x86_64
    BARK_RELEASE_SHA256: 649ebffa7a5aa2dd6a6b3c2b09ec8ea94b54e1d78385683b1933c3e856ab2a30
  cache:
    key: bark-0.1.0-beta.9
    paths:
      - .bark-release-cache/
  script:
    - git log --oneline -1
    - export RUN_DATETIME=$(cat RUN_DATETIME)
    - export CAPTAIND_EXEC=${CI_PROJECT_DIR}/target/ci/captaind
    - export BARKD_EXEC=${CI_PROJECT_DIR}/target/ci/barkd
    - >-
      export BARK_EXEC=$(python3 contrib/fetch-bark-release.py
      --url "$BARK_RELEASE_URL"
      --sha256 "$BARK_RELEASE_SHA256"
      --cache-dir "${CI_PROJECT_DIR}/.bark-release-cache")
    - bash ./contrib/ci-run-test.sh test-integration-bark-prebuilt

tar-and-print-test-data:
  interruptible: true
  stage: post-test
  tags:
    - datastore
  extends: .test-rules-no-tags
  needs:
    - job: bark-esplora
      optional: true
    - job: bark-mempool
      optional: true
    - job: bark-btc30
      optional: true
    - job: bark-filestore
      optional: true
    - job: core-server
      optional: true
    - job: int-bark-0.1.0-beta.9
      optional: true
  script:
    - |
      SRC="/host/data/test/${CI_COMMIT_SHA}"
      DST="/host/data/test/${CI_COMMIT_SHA}.tar.gz"
      if [ -d "$SRC" ]; then
        echo "Tarring test data: $SRC"
        tar -czf "$DST" "$SRC/"
        sudo mv "$DST" "$SRC/"
        echo "Test data tar.gz     -> https://ci.2nd.dev/testdata/${CI_COMMIT_SHA}/${CI_COMMIT_SHA}.tar.gz"
        echo "Test data URL        -> https://ci.2nd.dev/testdata/${CI_COMMIT_SHA}/"
      else
        echo "Warning: Test data directory $SRC does not exist – skipping tar"
      fi
