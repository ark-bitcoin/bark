tar-and-print-test-data:
  interruptible: true
  stage: post-test
  tags:
    - datastore
  extends: .test-rules-no-tags
  needs:
    - job: bark-esplora
      optional: true
    - job: bark-mempool
      optional: true
    - job: bark-btc30
      optional: true
    - job: bark-filestore
      optional: true
    - job: core-server
      optional: true
    - job: bark-sdk
      optional: true
    - job: bark-int-action-reentrancy
      optional: true
    - job: compat-bark-0.1.4
      optional: true
    - job: compat-bark-0.2.0
      optional: true
  script:
    - |
      SRC="/host/data/test/${CI_COMMIT_SHA}"
      DST="/host/data/test/${CI_COMMIT_SHA}.tar.gz"
      if [ -d "$SRC" ]; then
        echo "Tarring test data: $SRC"
        tar -czf "$DST" "$SRC/"
        sudo mv "$DST" "$SRC/"
        echo "Test data tar.gz     -> https://ci.2nd.dev/testdata/${CI_COMMIT_SHA}/${CI_COMMIT_SHA}.tar.gz"
        echo "Test data URL        -> https://ci.2nd.dev/testdata/${CI_COMMIT_SHA}/"
      else
        echo "Warning: Test data directory $SRC does not exist – skipping tar"
      fi
