# Test pipeline - build and integration tests

.build-rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^bark-/
    - if: $CI_COMMIT_TAG =~ /^server-/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

.test-rules-no-tags:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

check-commits:
  interruptible: true
  stage: prechecks
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - date +"%Y%m%d-%H%M%S" > RUN_DATETIME
    - git log --oneline -1
    - |
      if [ -z "$CI_COMMIT_TAG" ]; then
        nix develop .#default --command bash -c "just check-commits"
      else
        echo "Skipping check-commits for tag event"
      fi
    - git log --oneline -1
  artifacts:
    paths:
      - RUN_DATETIME
    expire_in: 1 day

build:
  interruptible: true
  stage: build
  extends: .build-rules
  needs:
    - prechecks
  script:
    - git log --oneline -1
    - nix develop .#default --command bash -c "just build-ci"
  artifacts:
    paths:
      - target/ci/examples/
      - target/ci/captaind
      - target/ci/watchmand
      - target/ci/bark
      - target/ci/barkd
      - target/ci/pid-lock-holder
    expire_in: 1 day

build-test-archives:
  interruptible: true
  stage: build
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - git log --oneline -1
    - nix develop .#default --command bash -c "just build-unit-tests-ci"
    - nix develop .#default --command bash -c "just build-integration-tests-ci"
  artifacts:
    paths:
      - target/ci/unit-tests.tar.zst
      - target/ci/integration-tests.tar.zst
    expire_in: 1 day

compare-static-files:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - build
  variables:
    ASSUME_BUILT: "1"
    EXAMPLES_DIR: target/ci/examples
  script:
    - nix develop .#default --command bash -c "just generate-static-files"
    - bash contrib/check-clean-diff.sh bark/schema.sql
    - bash contrib/check-clean-diff.sh server/schema.sql
    - bash contrib/check-clean-diff.sh bark-rest/openapi.json
    - bash contrib/check-clean-diff.sh bark-rest-client/

test-unit:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - build-test-archives
  script:
    - git log --oneline -1
    - nix develop .#default --command bash -c "cargo nextest run --archive-file target/ci/unit-tests.tar.zst"

test-doctests:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - git log --oneline -1
    - nix develop .#default --command bash -c "cargo test --doc"

use-bark-as-dependency:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - |
      nix develop .#default --command bash -c "
        cargo init barktest &&
        cd barktest &&
        cargo add bark-wallet &&
        cargo update &&
        cargo build
      "

bark-as-libs:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - |
      nix develop .#default --command bash -c "
        cargo check -p ark-lib                                               &&
        cargo check -p ark-lib --no-default-features                         &&
        cargo check -p bark-bitcoin-ext                                      &&
        cargo check -p bark-bitcoin-ext --no-default-features                &&
        cargo check -p bark-wallet                                           &&
        cargo check -p bark-wallet -F native --no-default-features           &&
        cargo check -p bark-json                                             &&
        cargo check -p bark-json --no-default-features                       &&
        cargo check -p bark-rest                                             &&
        cargo check -p bark-rest --no-default-features                       &&
        cargo check -p bark-rest-client                                      &&
        echo DONE
      "

bark-wasm:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - test-unit
  script:
    - |
      nix develop .#default --command bash -c "
        cargo build --target "wasm32-unknown-unknown" --lib --no-default-features \
          -p ark-lib --features wasm-web &&
        cargo build --target "wasm32-unknown-unknown" --lib --no-default-features \
          -p bark-bitcoin-ext --features wasm-web &&
        cargo build --target "wasm32-unknown-unknown" --lib --no-default-features \
          -p bark-server-rpc --features tonic-web &&
        cargo build --target "wasm32-unknown-unknown" --lib --no-default-features \
          -p bark-wallet --features wasm-web &&
        cargo build --target "wasm32-unknown-unknown" --lib --no-default-features \
          -p bark-wallet --features wasm-web,indexed-db
      "

bark-wasm-indexed-db-tests:
  interruptible: true
  allow_failure: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - test-unit
  script:
    - |
      nix develop .#default --command bash -c "
        wasm-pack test --headless --firefox bark --no-default-features --features 'indexed-db wasm-web' --lib
      "

lib-msrv:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - |
      nix develop .#msrv-lib --command bash -c "
        cd testing/msrv-lib &&
        cargo build
      "

check-fuzz:
  interruptible: true
  allow_failure: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - |
      nix develop .#default --command bash -c "
        cargo check --manifest-path fuzz/Cargo.toml
      "

check-release:
  interruptible: true
  stage: test
  extends: .test-rules-no-tags
  needs:
    - prechecks
  script:
    - |
      nix develop .#default --command bash -c "
