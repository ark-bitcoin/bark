bark-filestore:
  interruptible: true
  allow_failure: true
  stage: test
  tags:
    - integration
    - datastore
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - bark/src/persist/**/*
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - bark/src/persist/**/*
  needs:
    - check-commits
    - build
    - build-test-archives
  variables:
    CHAIN_SOURCE: mempool
    USE_FILESTORE: "1"
    TEST_DIRECTORY: ./test/filestore
    NEXTEST_TEST_THREADS: "2"
    BARK_COMMAND_TIMEOUT_MILLIS: "120000"
    TX_PROPAGATION_TIMEOUT: "30000"
  script:
