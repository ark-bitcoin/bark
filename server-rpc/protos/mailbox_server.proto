
syntax = "proto3";

package mailbox_server;

import "core.proto";

/// Public mailbox service.
service MailboxService {
	/// Deposits your VTXOs into the mailbox (blinded ID is unblinded with the VTXOs’ shared user pubkey; all VTXOs must have identical user pubkeys).
	rpc PostArkoorMessage(PostArkoorMessageRequest) returns (core.Empty) {};
	rpc SubscribeMailbox(MailboxRequest) returns (stream MailboxMessage);
	rpc ReadMailbox(MailboxRequest) returns (MailboxMessages);
	/// Deposits your VTXO IDs into your recovery mailbox.
	rpc PostRecoveryVtxoIds(PostRecoveryVtxoIdsRequest) returns (core.Empty) {};
	/// Deprecated, please use PostArkoorMessage.
	rpc PostVtxosMailbox(PostVtxosMailboxRequest) returns (core.Empty) {
		option deprecated = true;
	}
}

message PostArkoorMessageRequest {
	// The blinded mailbox ID
	bytes blinded_id = 1;
	repeated bytes vtxos = 2;
}

message MailboxRequest {
	// The unblinded mailbox ID to obtain data from
	bytes unblinded_id = 1;
	// A signed proof that you are allowed to read from this mailbox
	optional bytes authorization = 2;
	// The last checkpoint you have seen/processed
	uint64 checkpoint = 3;
}

message MailboxMessage {
	oneof message {
		ArkoorMessage arkoor = 1;
		RoundParticipationCompleted round_participation_completed = 4;
		IncomingLightningPaymentMessage incoming_lightning_payment = 5;
		RecoveryVtxoIdsMessage recovery_vtxo_ids = 6;
	}
	// Strictly ascending time based number.
	uint64 checkpoint = 2;
	MailboxType mailbox_type = 3 [ deprecated = true ];
}

message ArkoorMessage {
	repeated bytes vtxos = 1;
}

message RoundParticipationCompleted {
	repeated bytes payment_hashes = 1;
}

message IncomingLightningPaymentMessage {
	bytes payment_hash = 1;
}

message RecoveryVtxoIdsMessage {
	repeated bytes vtxo_ids = 1;
}

message MailboxMessages {
	repeated MailboxMessage messages = 1;
	/// Whether the server has more messages for you
	bool have_more = 2;
}

message PostRecoveryVtxoIdsRequest {
	// The unblinded recovery mailbox ID
	bytes unblinded_id = 1;
	repeated bytes vtxo_ids = 2;
}


/* deprecated things */
enum MailboxType {
	option deprecated = true;
	ARKOOR_RECEIVE = 0;
	ROUND_PARTICIPATION_COMPLETED = 1;
	LN_RECV_PENDING_PAYMENT = 2;
	RECOVERY_VTXO_IDS = 3;
}

message PostVtxosMailboxRequest {
	option deprecated = true;
	// The blinded mailbox ID
	bytes blinded_id = 1;
	repeated bytes vtxos = 2;
	MailboxType mailbox_type = 3;
}
